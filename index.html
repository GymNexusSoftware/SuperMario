<!DOCTYPE html>
<html>
<head>
    <title>Super Mario JS - Session Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: white; }
        canvas { border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; display: none; }
        
        #menu { text-align: center; background: #222; padding: 20px; border: 4px solid #fff; width: 300px; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 2px solid #fff; background: #000; color: #fff; text-align: center; font-family: inherit; }
        button { padding: 10px 20px; background: #f00; color: #fff; border: none; cursor: pointer; font-family: inherit; font-weight: bold; }
        .high-scores { font-size: 12px; margin-top: 15px; text-align: left; border-top: 1px solid #555; padding-top: 10px; }
        
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 15px; margin-top: 10px; }
        .btn { width: 65px; height: 65px; background: #333; border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #555; }
        .d-pad, .actions { display: flex; gap: 15px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>SUPER MARIO JS</h1>
        <p>INTRODUZ O TEU NOME:</p>
        <input type="text" id="playerName" maxlength="10" placeholder="JOGADOR 1">
        <br>
        <button onclick="startGame()">JOGAR</button>
        <div class="high-scores" id="highScoreList">
            <strong>TOP SCORES (ESTA SESSÃO):</strong><br>
            <span>Nenhum score ainda.</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; canvas.height = 350;

// Variáveis de Sessão (Limpam ao fechar a página)
let gameState = "MENU";
let playerName = "MARIO";
let sessionHighScores = []; 
const TILE_SIZE = 25; 
let currentLevel = 0;
let score = 0;
let gameTime = 400;
let lastTimeUpdate = Date.now();
let cameraX = 0;

function updateHighScoreDisplay() {
    let html = "<strong>TOP SCORES (ESTA SESSÃO):</strong><br>";
    if (sessionHighScores.length === 0) html += "Nenhum score ainda.";
    sessionHighScores.slice(0, 5).forEach((s, i) => {
        html += `${i+1}. ${s.name} - ${s.score}<br>`;
    });
    document.getElementById("highScoreList").innerHTML = html;
}

function saveSessionScore() {
    sessionHighScores.push({ name: playerName, score: score });
    sessionHighScores.sort((a, b) => b.score - a.score);
}

function startGame() {
    const inputName = document.getElementById("playerName").value.toUpperCase();
    playerName = inputName || "JOGADOR 1";
    
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    
    gameState = "PLAYING";
    score = 0;
    currentLevel = 0;
    resetPlayer();
    requestAnimationFrame(gameLoop);
}

function backToMenu() {
    gameState = "MENU";
    saveSessionScore();
    updateHighScoreDisplay();
    canvas.style.display = "none";
    document.getElementById("gameControls").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

// GERADOR DE 100 NÍVEIS
const allLevels = [];
for (let n = 0; n < 100; n++) {
    let newLevel = [1,1,1,1,1];
    let length = 150 + (n * 3);
    for (let i = 0; i < length; i++) {
        let rand = Math.random();
        if (rand < 0.65) newLevel.push(1);
        else if (rand < 0.8) newLevel.push(0);
        else if (rand < 0.88) newLevel.push(3);
        else if (rand < 0.94) newLevel.push(4);
        else newLevel.push(5);
    }
    newLevel.push(1,1,1,2);
    allLevels.push(newLevel);
}

let goombas = [];
function initGoombas() {
    goombas = [];
    const level = allLevels[currentLevel];
    for(let i=10; i<level.length - 5; i++) {
        if(level[i] === 1 && Math.random() > 0.92) {
            goombas.push({ x: i * TILE_SIZE, y: canvas.height - TILE_SIZE - 18, width: 18, height: 18, alive: true, dir: -1 });
        }
    }
}

let fireballs = [];
let lastFireTime = 0;
const player = { x: 40, y: 100, width: 20, height: 26, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100, isInvincible: false, invincibilityTimer: 0 };
const keys = {};

window.addEventListener("keydown", e => { keys[e.code] = true; if (e.code === "KeyZ") shootFireball(); });
window.addEventListener("keyup", e => keys[e.code] = false);

const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; if(key === "KeyZ") shootFireball(); });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
};
setupBtn("btnLeft", "ArrowLeft"); setupBtn("btnRight", "ArrowRight"); setupBtn("btnJump", "ArrowUp"); setupBtn("btnShoot", "KeyZ");

function resetPlayer(keepHP = false) {
    if (keepHP) {
        if (currentLevel > 0 && currentLevel % 3 === 0) player.hp = Math.min(100, player.hp + 25);
    } else {
        if (gameState === "PLAYING") backToMenu(); // Volta ao menu ao morrer
        player.hp = 100;
    }
    player.x = 40; player.y = 100; player.velX = 0; player.velY = 0;
    player.jumping = false; player.isInvincible = false; player.invincibilityTimer = 0;
    gameTime = 400; cameraX = 0; fireballs = []; initGoombas();
}

function shootFireball() {
    if (Date.now() - lastFireTime > 250) {
        fireballs.push({ x: player.x, y: player.y + 10, width: 10, height: 10, velX: 7 * player.direction });
        lastFireTime = Date.now();
    }
}

function update() {
    let gravity = (currentLevel >= 40 && currentLevel < 60) ? 0.2 : 0.5;
    let friction = (currentLevel >= 60 && currentLevel < 80) ? 0.97 : 0.8;

    if (Date.now() - lastTimeUpdate > 1000) { gameTime--; lastTimeUpdate = Date.now(); if(gameTime <= 0) resetPlayer(); }
    
    if (keys["ArrowRight"]) { player.velX += (friction === 0.97 ? 0.15 : 0.5); player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX -= (friction === 0.97 ? 0.15 : 0.5); player.direction = -1; }
    else { player.velX *= friction; }
    
    if (player.velX > 4.5) player.velX = 4.5;
    if (player.velX < -4.5) player.velX = -4.5;

    if ((keys["Space"] || keys["ArrowUp"]) && !player.jumping) { player.jumping = true; player.velY = (currentLevel >= 40 && currentLevel < 60) ? -7 : -11; }
    player.velY += gravity;
    
    let nextX = player.x + player.velX;
    let level = allLevels[currentLevel];
    let tileSide = Math.floor((nextX + (player.velX > 0 ? player.width : 0)) / TILE_SIZE);
    
    if (level[tileSide] === 3 && player.y + player.height > canvas.height - TILE_SIZE * 2 || level[tileSide] === 4 && player.y + player.height > canvas.height - TILE_SIZE * 3) { player.velX = 0; } else { player.x = nextX; }
    player.y += player.velY;

    let tileIndex = Math.floor((player.x + player.width / 2) / TILE_SIZE);
    let groundType = level[tileIndex];
    let groundY = 2000;
    if (groundType === 1) groundY = canvas.height - TILE_SIZE;
    else if (groundType === 3) groundY = canvas.height - TILE_SIZE * 2;
    else if (groundType === 4) groundY = canvas.height - TILE_SIZE * 3;
    else if (groundType === 5) groundY = canvas.height - TILE_SIZE * 4;

    if (player.y + player.height > groundY && player.velY >= 0) { player.y = groundY - player.height; player.velY = 0; player.jumping = false; }
    if (player.y > canvas.height) resetPlayer();
    if (currentLevel >= 80 && groundType === 0 && player.y > canvas.height - 35) resetPlayer();
    if (player.x < 0) player.x = 0;

    cameraX = player.x - canvas.width / 4; 
    if (cameraX < 0) cameraX = 0;
    let maxScroll = (level.length * TILE_SIZE) - canvas.width;
    if (cameraX > maxScroll) cameraX = maxScroll;

    if (player.isInvincible) { player.invincibilityTimer--; if (player.invincibilityTimer <= 0) player.isInvincible = false; }

    goombas.forEach(g => {
        if (g.alive) {
            let nextGX = g.x + g.dir;
            let gTile = Math.floor((nextGX + (g.dir > 0 ? g.width : 0)) / TILE_SIZE);
            if (level[gTile] >= 3 || nextGX < 0 || level[gTile] === 0) g.dir *= -1; else g.x = nextGX;
            if (player.x < g.x + g.width && player.x + player.width > g.x && player.y < g.y + g.height && player.y + player.height > g.y) {
                if (player.velY > 0 && player.y + player.height < g.y + 12) { g.alive = false; score += 100; player.velY = -7; } 
                else if (!player.isInvincible) { player.hp -= 25; player.isInvincible = true; player.invincibilityTimer = 70; player.velY = -4; if (player.hp <= 0) resetPlayer(); }
            }
        }
    });

    for (let i = fireballs.length - 1; i >= 0; i--) {
        let fb = fireballs[i]; fb.x += fb.velX;
        let fbTileX = Math.floor(fb.x / TILE_SIZE);
        if (level[fbTileX] >= 1 && level[fbTileX] !== 5 && fb.y + fb.height > canvas.height - (level[fbTileX] === 1 ? TILE_SIZE : (level[fbTileX] === 3 ? TILE_SIZE*2 : TILE_SIZE*3))) { fireballs.splice(i, 1); continue; }
        goombas.forEach(g => { if (g.alive && fb.x < g.x + g.width && fb.x + fb.width > g.x && fb.y < g.y + g.height && fb.y + fb.height > g.y) { g.alive = false; fireballs.splice(i, 1); score += 100; } });
        if (fb.x > cameraX + canvas.width || fb.x < cameraX) fireballs.splice(i, 1);
    }

    if (level[tileIndex] === 2) { score += 1000; currentLevel++; resetPlayer(true); }
}

function draw() {
    let bgColor = "#5c94fc", tCol = "#8b4513", gCol = "#228B22";
    if (currentLevel >= 20) { bgColor = "#000033"; tCol = "#4444aa"; gCol = "#0000ff"; }
    if (currentLevel >= 40) { bgColor = "#0055ff"; tCol = "#0033aa"; gCol = "#00ffff"; }
    if (currentLevel >= 60) { bgColor = "#ccffff"; tCol = "#ffffff"; gCol = "#00ffff"; }
    if (currentLevel >= 80) { bgColor = "#220000"; tCol = "#440000"; gCol = "#ff4400"; }
    
    canvas.style.background = bgColor;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save(); 
    ctx.translate(-cameraX, 0);

    const level = allLevels[currentLevel];
    level.forEach((tile, i) => {
        let x = i * TILE_SIZE;
        if (x + TILE_SIZE < cameraX || x > cameraX + canvas.width) return;
        if (tile === 1) { ctx.fillStyle = tCol; ctx.fillRect(x, canvas.height - TILE_SIZE, TILE_SIZE, TILE_SIZE); }
        else if (tile === 3 || tile === 4) { 
            let h = tile === 3 ? 2 : 3;
            ctx.fillStyle = tCol; ctx.fillRect(x, canvas.height - (TILE_SIZE * h), TILE_SIZE, TILE_SIZE * h); 
            ctx.fillStyle = gCol; ctx.fillRect(x, canvas.height - (TILE_SIZE * h), TILE_SIZE, 6);
        }
        else if (tile === 5) { ctx.fillStyle = "#ff0"; ctx.fillRect(x, canvas.height - (TILE_SIZE * 4), TILE_SIZE, 10); }
        else if (tile === 0 && currentLevel >= 80) { ctx.fillStyle = "#ff4400"; ctx.fillRect(x, canvas.height - 15, TILE_SIZE, 15); }
        else if (tile === 2) { ctx.fillStyle = "#f0f"; ctx.fillRect(x, canvas.height - 200, 15, 200); }
    });

    goombas.forEach(g => { if(g.alive) { ctx.fillStyle = "#8b4513"; ctx.fillRect(g.x, g.y, g.width, g.height); }});
    fireballs.forEach(fb => { ctx.fillStyle = "#ff8c00"; ctx.fillRect(fb.x, fb.y, fb.width, fb.height); });
    
    if (!player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0) { 
        ctx.fillStyle = "#ff0000"; 
        ctx.fillRect(player.x, player.y, player.width, player.height); 
    }
    ctx.restore();

    ctx.fillStyle = "#fff"; ctx.font = "bold 16px 'Courier New'";
    ctx.fillText(`${playerName} ${score.toString().padStart(6, '0')}`, 20, 30);
    ctx.fillText(`WORLD 1-${currentLevel+1}`, 250, 30);
    ctx.fillText(`TIME ${gameTime}`, 500, 30);
    let hearts = ""; for(let h=0; h<player.hp/25; h++) hearts += "❤"; ctx.fillStyle="#f00"; ctx.fillText(hearts, 20, 55);
}

function gameLoop() {
    if (gameState === "PLAYING") {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
}
</script>
</body>
</html>
