<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Super Mario PWA - Fix Final</title>
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; }
        canvas { border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 75vh; background: #5c94fc; display: none; }
        #namePopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid #fff; padding: 30px; text-align: center; box-shadow: 8px 8px 0 #f0f, -8px -8px 0 #0ff; z-index: 1000; width: 280px; }
        #nameInput { padding: 10px; width: 80%; background: #111; border: 2px solid #0ff; color: #fff; font-family: inherit; font-size: 18px; text-align: center; text-transform: uppercase; margin: 15px 0; outline: none; }
        #startBtn { padding: 12px 25px; background: #f0f; color: #fff; border: 2px solid #fff; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 10px; }
        .btn { width: 70px; height: 70px; background: rgba(50,50,50,0.8); border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; user-select: none; }
        .d-pad, .actions { display: flex; gap: 20px; }
    </style>
</head>
<body>

    <div id="namePopup">
        <h2 style="color: #ff0; margin: 0;">MARIO FIX</h2>
        <p id="loadingStatus" style="color: #0ff; font-size: 12px;">A carregar...</p>
        <input type="text" id="nameInput" maxlength="10" placeholder="NOME">
        <br>
        <button id="startBtn" disabled>AGUARDE...</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
const assets = {
    hero: { src: 'heroi.png', img: new Image(), color: '#ff0' },
    monster: { src: 'monstro1.png', img: new Image(), color: '#f0f' },
    platform: { src: 'plataforma.jpg', img: new Image(), color: '#ffff00' }
};

let loadedCount = 0;
Object.values(assets).forEach(asset => {
    asset.img.onload = () => { loadedCount++; if(loadedCount >= 3) { document.getElementById('startBtn').disabled = false; document.getElementById('startBtn').innerText = "JOGAR"; } };
    asset.img.src = asset.src;
});

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; canvas.height = 350;
const TILE_SIZE = 25;

let currentLevel = 0, score = 0, cameraX = 0, playerName = "NOME", fireballs = [], isPaused = false;
const player = { x: 40, y: 100, width: 32, height: 44, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100 };
const keys = {};

const allLevels = [];
for (let n = 0; n < 100; n++) {
    let newLevel = [1,1,1,1,1];
    for (let i = 0; i < 150; i++) {
        let rand = Math.random();
        if (rand < 0.7) newLevel.push(1);
        else if (rand < 0.8) newLevel.push(0);
        else if (rand < 0.9) newLevel.push(3);
        else newLevel.push(4);
    }
    newLevel.push(1,1,1,2);
    allLevels.push(newLevel);
}

let monsters = [];
function initMonsters() {
    monsters = [];
    allLevels[currentLevel].forEach((tile, i) => {
        if(tile === 1 && Math.random() > 0.95 && i > 15) monsters.push({ x: i * TILE_SIZE, y: canvas.height - TILE_SIZE - 30, width: 30, height: 30, alive: true, dir: -1.5 });
    });
}

function resetPlayer(reason) {
    if (reason === "win") player.hp = Math.min(100, player.hp + 25);
    else if (reason === "fall" || reason === "death") { player.hp -= 25; if(player.hp <= 0) { player.hp = 100; currentLevel = 0; score = 0; } }
    player.x = 40; player.y = 100; player.velX = 0; player.velY = 0; fireballs = [];
    initMonsters();
    isPaused = true;
    setTimeout(() => isPaused = false, 1000);
}

document.getElementById("startBtn").onclick = () => {
    playerName = document.getElementById("nameInput").value.toUpperCase() || "PLAYER";
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    resetPlayer("start");
    gameLoop();
};

window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "KeyZ") shoot(); });
window.addEventListener("keyup", e => keys[e.code] = false);

function shoot() {
    if (!isPaused) fireballs.push({ x: player.x + (player.direction === 1 ? player.width : -12), y: player.y + 15, width: 12, height: 12, velX: 8 * player.direction });
}

// Mobile Controls
const setBtn = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[k] = true; if(k === "KeyZ") shoot(); });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[k] = false; });
};
setBtn("btnLeft", "ArrowLeft"); setBtn("btnRight", "ArrowRight"); setBtn("btnJump", "ArrowUp"); setBtn("btnShoot", "KeyZ");

function update() {
    if (isPaused) return;
    
    if (keys["ArrowRight"]) { player.velX = 4; player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX = -4; player.direction = -1; }
    else player.velX = 0;

    if (keys["ArrowUp"] && !player.jumping) { player.velY = -11; player.jumping = true; }
    player.velY += 0.6;

    let level = allLevels[currentLevel];
    
    // Movimento Horizontal com Bloqueio de Obstáculos
    let nextX = player.x + player.velX;
    let sideTile = Math.floor((nextX + (player.direction === 1 ? player.width : 0)) / TILE_SIZE);
    let sideTileType = level[sideTile];
    let sideTileHeight = (sideTileType === 3 ? 2 : sideTileType === 4 ? 3 : sideTileType === 1 ? 1 : 0);
    let sideTopY = canvas.height - (sideTileHeight * TILE_SIZE);

    if (sideTileHeight > 0 && player.y + player.height > sideTopY + 5) {
        player.velX = 0; // Bateu na parede
    } else {
        player.x += player.velX;
    }

    // Movimento Vertical e Chão
    player.y += player.velY;
    let footTile = Math.floor((player.x + player.width / 2) / TILE_SIZE);
    let groundType = level[footTile];
    let gH = (groundType === 3 ? 2 : groundType === 4 ? 3 : groundType === 1 ? 1 : 0);
    let groundY = canvas.height - (gH * TILE_SIZE);

    if (gH > 0 && player.y + player.height > groundY) {
        player.y = groundY - player.height;
        player.velY = 0;
        player.jumping = false;
    }

    if (player.y > canvas.height) resetPlayer("fall");
    cameraX = Math.max(0, player.x - 150);

    // Balas com colisão em obstáculos
    for (let i = fireballs.length - 1; i >= 0; i--) {
        let f = fireballs[i]; f.x += f.velX;
        let fTile = Math.floor(f.x / TILE_SIZE);
        let fTileType = level[fTile];
        let fH = (fTileType === 3 ? 2 : fTileType === 4 ? 3 : fTileType === 1 ? 1 : 0);
        let fTopY = canvas.height - (fH * TILE_SIZE);

        if (fH > 0 && f.y + f.height > fTopY) { fireballs.splice(i, 1); continue; }
        if (f.x < cameraX || f.x > cameraX + canvas.width) { fireballs.splice(i, 1); continue; }
        
        monsters.forEach(m => { if(m.alive && f.x < m.x + m.width && f.x + f.width > m.x && f.y < m.y + m.height && f.y + f.height > m.y) { m.alive = false; score += 200; fireballs.splice(i, 1); } });
    }

    monsters.forEach(m => {
        if (m.alive) {
            m.x += m.dir;
            if (player.x < m.x + m.width && player.x + player.width > m.x && player.y < m.y + m.height && player.y + player.height > m.y) {
                if (player.velY > 0) { m.alive = false; score += 100; player.velY = -7; }
                else resetPlayer("death");
            }
        }
    });

    if (level[footTile] === 2) { currentLevel++; resetPlayer("win"); }
}

function drawImg(asset, x, y, w, h) {
    if (asset.img.complete && asset.img.naturalWidth !== 0) ctx.drawImage(asset.img, x, y, w, h);
    else { ctx.fillStyle = asset.color; ctx.fillRect(x, y, w, h); }
}

function draw() {
    if (isPaused) {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(`MUNDO 1-${currentLevel+1}`, canvas.width/2, canvas.height/2);
        return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);
    
    allLevels[currentLevel].forEach((tile, i) => {
        if (tile === 0) return;
        let x = i * TILE_SIZE, h = (tile === 3 ? 2 : tile === 4 ? 3 : 1), y = canvas.height - (h * TILE_SIZE);
        if (tile === 1 || tile === 3 || tile === 4) { ctx.fillStyle = "#8b4513"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE); ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, y, TILE_SIZE, 5); }
        else if (tile === 2) { ctx.fillStyle = "#f0f"; ctx.fillRect(x, canvas.height-100, 20, 100); }
    });

    monsters.forEach(m => { if(m.alive) drawImg(assets.monster, m.x, m.y, m.width, m.height); });
    fireballs.forEach(f => { ctx.fillStyle = "#ffeb3b"; ctx.beginPath(); ctx.arc(f.x+6, f.y+6, 6, 0, Math.PI*2); ctx.fill(); });
    drawImg(assets.hero, player.x, player.y, player.width, player.height);
    
    ctx.restore();
    ctx.fillStyle = "#fff"; ctx.textAlign = "left"; ctx.fillText(`${playerName}: ${score} | HP: ${player.hp}%`, 20, 30);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
