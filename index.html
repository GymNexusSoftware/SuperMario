<!DOCTYPE html>
<html>
<head>
    <title>Super Mario - Estável</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; }
        canvas { border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; background: #5c94fc; display: none; }
        #namePopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid #fff; padding: 30px; text-align: center; box-shadow: 8px 8px 0 #f0f, -8px -8px 0 #0ff; z-index: 1000; width: 280px; display: block; }
        #nameInput { padding: 10px; width: 80%; background: #111; border: 2px solid #0ff; color: #fff; font-family: inherit; font-size: 18px; text-align: center; text-transform: uppercase; margin: 15px 0; outline: none; }
        #startBtn { padding: 12px 25px; background: #f0f; color: #fff; border: 2px solid #fff; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0 #000; }
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 15px; margin-top: 10px; }
        .btn { width: 65px; height: 65px; background: #333; border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #555; }
        .d-pad, .actions { display: flex; gap: 15px; }
    </style>
</head>
<body>

    <div id="namePopup">
        <h2 style="color: #ff0; margin: 0; text-shadow: 2px 2px #f00;">PLAYER ENTRY</h2>
        <input type="text" id="nameInput" maxlength="10" placeholder="NOME">
        <br>
        <button id="startBtn">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; canvas.height = 350;

const TILE_SIZE = 25; 
let currentLevel = 0, score = 0, cameraX = 0, playerName = "NOME";
let fireballs = [], lastFireTime = 0, gameTime = 400, lastTimeUpdate = Date.now();
let isPaused = true;

const imgHero = new Image(); imgHero.src = 'heroi.png';
const imgMonstro = new Image(); imgMonstro.src = 'monstro1.png';
const imgPlatSuspensas = new Image(); imgPlatSuspensas.src = 'plataforma.jpg';
const imgChao = new Image(); imgChao.src = 'chao_normal.jpg';
const imgChaoNeve = new Image(); imgChaoNeve.src = 'chao_neve.jpg';

const allLevels = [];
for (let n = 0; n < 20; n++) {
    let newLevel = [1,1,1,1,1];
    for (let i = 0; i < 150; i++) {
        let rand = Math.random();
        if (rand < 0.65) newLevel.push(1);
        else if (rand < 0.75) newLevel.push(0);
        else if (rand < 0.85) newLevel.push(3);
        else if (rand < 0.92) newLevel.push(4);
        else newLevel.push(6);
    }
    newLevel.push(1,1,1,2);
    allLevels.push(newLevel);
}

let monsters = [];
const player = { x: 40, y: 100, width: 32, height: 44, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100, isInvincible: false, timerInv: 0 };
const keys = {};

function initMonsters() {
    monsters = [];
    const level = allLevels[currentLevel] || allLevels[0];
    for(let i=15; i<level.length - 10; i++) {
        if(level[i] === 1 && Math.random() > 0.9) {
            monsters.push({ x: i * TILE_SIZE, y: canvas.height - TILE_SIZE - 30, width: 30, height: 30, alive: true, dir: -1.5 });
        }
    }
}

function resetPlayer(reason) {
    if (reason === "win") score += 1000;
    else if (reason === "fall" || reason === "death") { player.hp = 100; if(reason === "death") score = 0; }
    player.x = 40; player.y = 100; player.velX = 0; player.velY = 0;
    player.jumping = false; player.isInvincible = false;
    cameraX = 0; fireballs = []; gameTime = 400;
    initMonsters();
    isPaused = true;
    setTimeout(() => isPaused = false, 1000);
}

function update() {
    if (isPaused) return;
    if (Date.now() - lastTimeUpdate > 1000) { gameTime--; lastTimeUpdate = Date.now(); if(gameTime <= 0) resetPlayer("death"); }

    if (keys["ArrowRight"]) { player.velX = 4.5; player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX = -4.5; player.direction = -1; }
    else { player.velX = 0; }

    if (keys["ArrowUp"] && !player.jumping) { player.jumping = true; player.velY = -11; }
    player.velY += 0.5;

    let level = allLevels[currentLevel] || allLevels[0];
    
    let oldX = player.x;
    player.x += player.velX;
    let tSide = level[Math.floor((player.velX > 0 ? player.x + player.width : player.x) / TILE_SIZE)];
    let hW = (tSide === 1 ? 1 : tSide === 3 ? 2 : tSide === 4 ? 3 : 0);
    if (hW > 0 && player.y + player.height > canvas.height - hW * TILE_SIZE + 5) { player.x = oldX; player.velX = 0; }

    player.y += player.velY;
    let tX = Math.floor((player.x + player.width/2)/TILE_SIZE);
    let groundY = 1000;
    if (level[tX] === 1) groundY = canvas.height - TILE_SIZE;
    else if (level[tX] === 3) groundY = canvas.height - TILE_SIZE * 2;
    else if (level[tX] === 4) groundY = canvas.height - TILE_SIZE * 3;
    else if (level[tX] === 6 && player.velY >= 0 && player.y + player.height <= canvas.height - TILE_SIZE * 4 + 10) groundY = canvas.height - TILE_SIZE * 4;

    if (player.y + player.height > groundY && player.velY >= 0) {
        player.y = groundY - player.height;
        player.velY = 0;
        player.jumping = false;
    }

    if (player.y > canvas.height) resetPlayer("fall");
    cameraX = Math.max(0, player.x - 150);

    monsters.forEach(m => {
        if(m.alive) {
            m.x += m.dir;
            let mTile = level[Math.floor((m.x + (m.dir > 0 ? m.width : 0))/TILE_SIZE)];
            if(!mTile || mTile >= 3) m.dir *= -1;
            if (player.x < m.x + m.width && player.x + player.width > m.x && player.y < m.y + m.height && player.y + player.height > m.y) {
                if (player.velY > 0) { m.alive = false; player.velY = -8; score += 100; }
                else if (!player.isInvincible) { player.hp -= 25; player.isInvincible = true; player.timerInv = 60; if(player.hp <= 0) resetPlayer("death"); }
            }
        }
    });

    if (player.isInvincible) { player.timerInv--; if(player.timerInv <= 0) player.isInvincible = false; }
    if (level[tX] === 2) { currentLevel++; resetPlayer("win"); }
}

function draw() {
    if (isPaused) {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "24px Arial"; ctx.textAlign = "center";
        ctx.fillText("WORLD 1-" + (currentLevel + 1), canvas.width/2, canvas.height/2);
        ctx.textAlign = "left"; return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);
    let level = allLevels[currentLevel] || allLevels[0];
    level.forEach((tile, i) => {
        if (tile === 0) return;
        let x = i * TILE_SIZE;
        let h = (tile === 3 ? 2 : tile === 4 ? 3 : 1);
        let y = (tile === 6) ? canvas.height - 4 * TILE_SIZE : canvas.height - h * TILE_SIZE;
        let img = (currentLevel % 2 === 0) ? imgChao : imgChaoNeve;
        if (tile === 1 || tile === 3 || tile === 4) {
            if (img.complete) { for(let r=0; r<h; r++) ctx.drawImage(img, x, y + r*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
            else { ctx.fillStyle = "#8b4513"; ctx.fillRect(x, y, TILE_SIZE, h*TILE_SIZE); }
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, y, TILE_SIZE, 5);
        } else if (tile === 6) {
            if (imgPlatSuspensas.complete) ctx.drawImage(imgPlatSuspensas, x, y, TILE_SIZE, TILE_SIZE);
            else { ctx.fillStyle = "#ff0"; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); }
        } else if (tile === 2) {
            ctx.fillStyle = "#fff"; ctx.fillRect(x+10, canvas.height-120, 5, 120);
        }
    });
    monsters.forEach(m => { if(m.alive) ctx.drawImage(imgMonstro, m.x, m.y, m.width, m.height); });
    if (!player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0) ctx.drawImage(imgHero, player.x, player.y, player.width, player.height);
    ctx.restore();
    ctx.fillStyle = "#fff"; ctx.font = "16px Arial";
    ctx.fillText("SCORE: " + score, 20, 30);
    ctx.fillText("TIME: " + gameTime, 480, 30);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

document.getElementById("startBtn").onclick = function() {
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    resetPlayer("start");
    gameLoop();
};

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function setBtn(id, k) {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[k] = true; });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[k] = false; });
}
setBtn("btnLeft", "ArrowLeft"); setBtn("btnRight", "ArrowRight"); setBtn("btnJump", "ArrowUp");
</script>
</body>
</html>
