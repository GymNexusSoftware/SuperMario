<!DOCTYPE html>
<html>
<head>
    <title>Super Mario - World with Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; }
        canvas { border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; background: #5c94fc; display: none; }
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 15px; margin-top: 10px; }
        .btn { width: 65px; height: 65px; background: #333; border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #555; }
        .d-pad, .actions { display: flex; gap: 15px; }

        #namePopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 4px solid #fff; padding: 30px; text-align: center;
            box-shadow: 8px 8px 0 #f0f, -8px -8px 0 #0ff; z-index: 1000; width: 280px;
        }
        #nameInput { padding: 10px; width: 80%; background: #111; border: 2px solid #0ff; color: #fff; font-family: inherit; font-size: 18px; text-align: center; text-transform: uppercase; margin: 15px 0; outline: none; }
        #startBtn { padding: 12px 25px; background: #f0f; color: #fff; border: 2px solid #fff; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="namePopup">
        <h2 style="color: #ff0; margin: 0; text-shadow: 2px 2px #f00;">PLAYER ENTRY</h2>
        <input type="text" id="nameInput" maxlength="10" placeholder="MARIO">
        <br>
        <button id="startBtn">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; canvas.height = 350;

const TILE_SIZE = 25; 
let currentLevel = 0;
let score = 0;
let cameraX = 0;
let playerName = "MARIO";
let fireballs = [];
let lastFireTime = 0;

// TIMER VARIABLES
let gameTime = 400;
let lastTimeUpdate = Date.now();

const allLevels = [];
for (let n = 0; n < 100; n++) {
    let newLevel = [1,1,1,1,1];
    let length = 150 + (n * 3);
    for (let i = 0; i < length; i++) {
        let rand = Math.random();
        if (rand < 0.60) newLevel.push(1);
        else if (rand < 0.70) newLevel.push(0);
        else if (rand < 0.80) newLevel.push(3); 
        else if (rand < 0.88) newLevel.push(4); 
        else if (rand < 0.94) newLevel.push(6); 
        else newLevel.push(1);
    }
    newLevel.push(1,1,1,2);
    allLevels.push(newLevel);
}

let goombas = [];
function initGoombas() {
    goombas = [];
    const level = allLevels[currentLevel];
    for(let i=10; i<level.length - 5; i++) {
        if(level[i] === 1 && Math.random() > 0.93) {
            goombas.push({ x: i * TILE_SIZE, y: canvas.height - TILE_SIZE - 18, width: 18, height: 18, alive: true, dir: -1 });
        }
    }
}

const player = { x: 40, y: 100, width: 20, height: 26, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100, isInvincible: false, invincibilityTimer: 0 };
const keys = {};

function resetPlayer(keepHP = false) {
    if (keepHP && currentLevel > 0 && currentLevel % 3 === 0) {
        player.hp = Math.min(100, player.hp + 25);
    } else if (!keepHP) {
        player.hp = 100;
    }
    player.x = 40; player.y = 100; player.velX = 0; player.velY = 0;
    player.jumping = false; player.isInvincible = false; player.invincibilityTimer = 0;
    cameraX = 0; fireballs = []; gameTime = 400; initGoombas();
}

function shootFireball() {
    if (Date.now() - lastFireTime > 300) {
        fireballs.push({ x: player.x + (player.direction === 1 ? 20 : -5), y: player.y + 10, width: 10, height: 10, velX: 6 * player.direction });
        lastFireTime = Date.now();
    }
}

document.getElementById("startBtn").onclick = function() {
    playerName = document.getElementById("nameInput").value.toUpperCase() || "MARIO";
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    resetPlayer();
    gameLoop();
};

window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "KeyZ" || e.code === "KeyB") shootFireball(); });
window.addEventListener("keyup", e => keys[e.code] = false);

const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; if(key === "KeyZ") shootFireball(); });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
};
setupBtn("btnLeft", "ArrowLeft"); setupBtn("btnRight", "ArrowRight"); setupBtn("btnJump", "ArrowUp"); setupBtn("btnShoot", "KeyZ");

function update() {
    // LOGICA DO TIMER
    if (Date.now() - lastTimeUpdate > 1000) { 
        gameTime--; 
        lastTimeUpdate = Date.now(); 
        if(gameTime <= 0) resetPlayer(); 
    }

    if (keys["ArrowRight"]) { player.velX += 0.5; player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX -= 0.5; player.direction = -1; }
    else { player.velX *= 0.8; }
    
    player.velX = Math.max(-4.5, Math.min(4.5, player.velX));
    if (keys["ArrowUp"] && !player.jumping) { player.jumping = true; player.velY = -11; }
    player.velY += 0.5;
    
    let level = allLevels[currentLevel];
    let nextX = player.x + player.velX;
    let sideTile = Math.floor((nextX + (player.velX > 0 ? player.width : 0)) / TILE_SIZE);
    let hObs = (level[sideTile] === 3) ? TILE_SIZE*2 : (level[sideTile] === 4 ? TILE_SIZE*3 : 0);

    if (hObs > 0 && player.y + player.height > canvas.height - hObs) {
        player.velX = 0;
    } else {
        player.x = nextX;
    }

    player.y += player.velY;

    let tileIndex = Math.floor((player.x + player.width/2) / TILE_SIZE);
    let groundY = 1000;
    if (level[tileIndex] === 1) groundY = canvas.height - TILE_SIZE;
    else if (level[tileIndex] === 3) groundY = canvas.height - TILE_SIZE * 2;
    else if (level[tileIndex] === 4) groundY = canvas.height - TILE_SIZE * 3;
    else if (level[tileIndex] === 6) groundY = canvas.height - TILE_SIZE * 4;

    if (player.y + player.height > groundY && player.velY >= 0) {
        player.y = groundY - player.height;
        player.velY = 0;
        player.jumping = false;
    }

    if (player.y > canvas.height) resetPlayer();
    cameraX = Math.max(0, player.x - 150);

    for (let i = fireballs.length - 1; i >= 0; i--) {
        let f = fireballs[i]; f.x += f.velX;
        let fTile = Math.floor(f.x / TILE_SIZE);
        if (level[fTile] === 3 || level[fTile] === 4) fireballs.splice(i, 1);
        else if (f.x < cameraX || f.x > cameraX + canvas.width) fireballs.splice(i, 1);
        goombas.forEach(g => {
            if (g.alive && f.x < g.x + g.width && f.x + f.width > g.x && f.y < g.y + g.height && f.y + f.height > g.y) {
                g.alive = false; fireballs.splice(i, 1); score += 100;
            }
        });
    }

    goombas.forEach(g => {
        if (g.alive) {
            g.x += g.dir;
            let gTile = Math.floor((g.x + (g.dir > 0 ? g.width : 0)) / TILE_SIZE);
            if(level[gTile] >= 3 || level[gTile] === 0) g.dir *= -1;
            if (player.x < g.x + g.width && player.x + player.width > g.x && player.y < g.y + g.height && player.y + player.height > g.y) {
                if (player.velY > 0) { g.alive = false; score += 100; player.velY = -7; } 
                else if (!player.isInvincible) { player.hp -= 25; player.isInvincible = true; player.invincibilityTimer = 70; if (player.hp <= 0) resetPlayer(); }
            }
        }
    });

    if (player.isInvincible) { player.invincibilityTimer--; if (player.invincibilityTimer <= 0) player.isInvincible = false; }
    if (level[tileIndex] === 2) { score += 1000; currentLevel++; resetPlayer(true); }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);
    const level = allLevels[currentLevel];
    
    for(let m=0; m<level.length; m+=20) {
        ctx.fillStyle = "#4caf50"; ctx.beginPath();
        ctx.moveTo(m*TILE_SIZE-50, canvas.height-TILE_SIZE);
        ctx.lineTo(m*TILE_SIZE+50, canvas.height-120);
        ctx.lineTo(m*TILE_SIZE+150, canvas.height-TILE_SIZE); ctx.fill();
    }

    level.forEach((tile, i) => {
        let x = i * TILE_SIZE;
        if (tile === 1) { 
            ctx.fillStyle = "#8b4513"; ctx.fillRect(x, canvas.height-TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, canvas.height-TILE_SIZE, TILE_SIZE, 5);
        } else if (tile === 3 || tile === 4) { 
            let h = (tile === 3 ? 2 : 3);
            ctx.fillStyle = "#757575"; ctx.fillRect(x, canvas.height-(h*TILE_SIZE), TILE_SIZE, h*TILE_SIZE);
            ctx.fillStyle = "#212121"; ctx.fillRect(x, canvas.height-(h*TILE_SIZE), TILE_SIZE, 4);
        } else if (tile === 6) { 
            ctx.fillStyle = "#ffeb3b"; ctx.fillRect(x, canvas.height - (4*TILE_SIZE), TILE_SIZE, 8);
            ctx.fillStyle = "#f57f17"; ctx.fillRect(x, canvas.height - (4*TILE_SIZE) + 8, TILE_SIZE, 4);
        } else if (tile === 2) { 
            ctx.fillStyle = "#fff"; ctx.fillRect(x+10, canvas.height-150, 5, 150);
            ctx.fillStyle = "#f0f"; ctx.fillRect(x+15, canvas.height-150, 20, 15);
        }
    });

    goombas.forEach(g => { if(g.alive) { ctx.fillStyle = "#5d4037"; ctx.fillRect(g.x, g.y, g.width, g.height); }});
    fireballs.forEach(f => { ctx.fillStyle = "#ff4500"; ctx.beginPath(); ctx.arc(f.x+5, f.y+5, 5, 0, Math.PI*2); ctx.fill(); });
    
    if (!player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0) { 
        ctx.fillStyle = "#f00"; ctx.fillRect(player.x, player.y, player.width, player.height); 
    }
    ctx.restore();

    // HUD COM TIMER
    ctx.fillStyle = "#fff"; ctx.font = "bold 16px Courier";
    ctx.fillText(`${playerName} ${score}`, 20, 30);
    ctx.fillText(`WORLD 1-${currentLevel+1}`, 240, 30);
    ctx.fillText(`TIME: ${gameTime}`, 480, 30); // TIMER NO CANTO DIREITO
    let hearts = ""; for(let h=0; h<player.hp/25; h++) hearts += "❤";
    ctx.fillStyle="#f00"; ctx.fillText(hearts, 20, 55);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
