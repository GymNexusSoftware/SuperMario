<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Super Mario - Edição Robusta PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; }
        canvas { border: 4px solid #333; image-rendering: pixelated; background: #5c94fc; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #namePopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid #fff; padding: 30px; text-align: center; box-shadow: 8px 8px 0 #f0f; z-index: 1000; color: white; }
        #nameInput { padding: 10px; width: 80%; background: #111; border: 2px solid #0ff; color: #fff; text-align: center; margin: 15px 0; outline: none; }
        #startBtn { padding: 12px 25px; background: #f0f; color: #fff; border: 2px solid #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(50,50,50,0.8); border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; user-select: none; touch-action: none; }
        .actions .btn { background: #a00; }
        .d-pad, .actions { display: flex; gap: 20px; }
    </style>
</head>
<body>

    <div id="namePopup">
        <h2 style="color: #ff0; margin: 0;">MARIO ENGINE V3</h2>
        <input type="text" id="nameInput" maxlength="10" placeholder="TEU NOME">
        <br>
        <button id="startBtn">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="controls" id="gameControls">
        <div class="d-pad">
            <div class="btn" id="btnLeft">←</div>
            <div class="btn" id="btnRight">→</div>
        </div>
        <div class="actions">
            <div class="btn" id="btnShoot">B</div>
            <div class="btn" id="btnJump">A</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; 
canvas.height = 350;

// CONFIGURAÇÕES E ASSETS
const TILE_SIZE = 25;
const GRAVITY = 0.6;
const JUMP_FORCE = -11;
const SPEED = 4;

const imgHero = new Image(); imgHero.src = 'heroi.png';
const imgMonstro = new Image(); imgMonstro.src = 'monstro1.png';
const imgPlat = new Image(); imgPlat.src = 'plataforma.jpg';

let currentLevel = 0;
let score = 0;
let cameraX = 0;
let playerName = "PLAYER";
let isPaused = false;
let gameTime = 400;
let fireballs = [];
let monsters = [];

const player = {
    x: 50, y: 100,
    w: 30, h: 42,
    vx: 0, vy: 0,
    jumping: true,
    dir: 1,
    hp: 100
};

const keys = {};

// GERAÇÃO DE NÍVEL SÓLIDO
const levels = [];
for(let l=0; l<10; l++) {
    let data = [];
    for(let i=0; i<250; i++) {
        if(i < 10) data.push(1); // Início seguro
        else {
            let r = Math.random();
            if(r < 0.75) data.push(1);      // Chão normal
            else if(r < 0.85) data.push(0); // Buraco
            else if(r < 0.92) data.push(3); // Cano/Monte Médio
            else data.push(4);             // Cano/Monte Alto
        }
    }
    data.push(1,1,2); // Fim com bandeira
    levels.push(data);
}

function initLevel() {
    monsters = [];
    fireballs = [];
    const data = levels[currentLevel];
    data.forEach((tile, i) => {
        if(tile === 1 && i > 20 && Math.random() > 0.95) {
            monsters.push({ x: i*TILE_SIZE, y: canvas.height-TILE_SIZE-30, w: 30, h: 30, alive: true, vx: -1.5 });
        }
    });
}

function resetGame(type) {
    if(type === "fall" || type === "death") {
        player.hp -= 25;
        if(player.hp <= 0) { player.hp = 100; currentLevel = 0; score = 0; }
    }
    player.x = 50; player.y = 100; player.vx = 0; player.vy = 0;
    cameraX = 0;
    initLevel();
    isPaused = true;
    setTimeout(() => { isPaused = false; }, 1000);
}

// LÓGICA DE COLISÃO PRECISA
function getTile(x, y) {
    const col = Math.floor(x / TILE_SIZE);
    const row = Math.floor(y / TILE_SIZE); // Opcional se tivéssemos tiles verticais
    const type = levels[currentLevel][col] || 0;
    let height = 0;
    if(type === 1) height = 1;
    if(type === 3) height = 2;
    if(type === 4) height = 3;
    if(type === 2) height = 99; // Bandeira
    return { type, top: canvas.height - (height * TILE_SIZE) };
}

function update() {
    if(isPaused) return;

    // Movimento Horizontal
    if(keys["ArrowRight"]) { player.vx = SPEED; player.dir = 1; }
    else if(keys["ArrowLeft"]) { player.vx = -SPEED; player.dir = -1; }
    else { player.vx = 0; }

    // Aplicar VX e verificar paredes
    player.x += player.vx;
    
    // Verificação de Parede (Check na frente do boneco em 3 alturas: pés, meio, cabeça)
    let sideX = player.vx > 0 ? player.x + player.w : player.x;
    let checkPoints = [player.y + 5, player.y + player.h / 2, player.y + player.h - 5];
    
    for(let py of checkPoints) {
        let t = getTile(sideX, py);
        if(py > t.top) { // Se algum ponto colidir com a altura do tile
            player.x -= player.vx; // Bloqueia movimento
            player.vx = 0;
            break;
        }
    }

    // Gravidade e Pulo
    if(keys["ArrowUp"] && !player.jumping) {
        player.vy = JUMP_FORCE;
        player.jumping = true;
    }
    player.vy += GRAVITY;
    player.y += player.vy;

    // Verificação de Chão e Teto
    let centerX = player.x + player.w / 2;
    let tFoot = getTile(centerX, player.y + player.h);
    
    if(player.y + player.h > tFoot.top) {
        if(tFoot.type === 2) { // Vitoria
            currentLevel++;
            resetGame("win");
            return;
        }
        player.y = tFoot.top - player.h;
        player.vy = 0;
        player.jumping = false;
    }

    if(player.y > canvas.height) { resetGame("fall"); return; }

    // Câmera
    cameraX = Math.max(0, player.x - 150);

    // Balas vs Cenário
    for(let i = fireballs.length-1; i>=0; i--) {
        let f = fireballs[i];
        f.x += f.vx;
        let tBala = getTile(f.x + (f.vx > 0 ? f.w : 0), f.y + f.h/2);
        if(f.y + f.h > tBala.top) { fireballs.splice(i, 1); continue; }
        
        monsters.forEach(m => {
            if(m.alive && f.x < m.x + m.w && f.x + f.w > m.x && f.y < m.y + m.h && f.y + f.h > m.y) {
                m.alive = false; score += 200; fireballs.splice(i, 1);
            }
        });
    }

    // Monstros
    monsters.forEach(m => {
        if(!m.alive) return;
        m.x += m.vx;
        // Colisão simples monstro/jogador
        if(player.x < m.x + m.w && player.x + player.w > m.x && player.y < m.y + m.h && player.y + player.h > m.y) {
            if(player.vy > 0 && player.y + player.h < m.y + 15) {
                m.alive = false; score += 100; player.vy = -8;
            } else {
                resetGame("death");
            }
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(isPaused) {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "24px Courier"; ctx.textAlign = "center";
        ctx.fillText(`WORLD 1-${currentLevel+1}`, canvas.width/2, canvas.height/2);
        ctx.textAlign = "left";
        requestAnimationFrame(draw);
        return;
    }

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Desenhar Cenário
    const data = levels[currentLevel];
    data.forEach((tile, i) => {
        if(tile === 0) return;
        let x = i * TILE_SIZE;
        let h = (tile === 3 ? 2 : tile === 4 ? 3 : 1);
        let y = canvas.height - (h * TILE_SIZE);
        
        if(tile === 2) { // Bandeira
            ctx.fillStyle = "#fff"; ctx.fillRect(x, canvas.height-120, 5, 120);
            ctx.fillStyle = "#f0f"; ctx.fillRect(x, canvas.height-120, 25, 20);
        } else {
            ctx.fillStyle = "#8b4513"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE);
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, y, TILE_SIZE, 5);
        }
    });

    // Monstros e Balas
    monsters.forEach(m => { if(m.alive) ctx.drawImage(imgMonstro, m.x, m.y, m.w, m.h); });
    fireballs.forEach(f => { ctx.fillStyle = "#ff0"; ctx.beginPath(); ctx.arc(f.x+5, f.y+5, 5, 0, Math.PI*2); ctx.fill(); });
    
    // Jogador
    ctx.drawImage(imgHero, player.x, player.y, player.w, player.h);

    ctx.restore();

    // UI fixa
    ctx.fillStyle = "#fff"; ctx.font = "bold 16px Courier";
    ctx.fillText(`${playerName} | SCORE: ${score} | HP: ${player.hp}%`, 20, 30);

    update();
    requestAnimationFrame(draw);
}

// CONTROLES E START
function shoot() { if(!isPaused) fireballs.push({ x: player.x+15, y: player.y+15, w: 10, h: 10, vx: player.dir*7 }); }

document.getElementById("startBtn").onclick = () => {
    playerName = document.getElementById("nameInput").value.toUpperCase() || "MARIO";
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    resetGame("start");
    draw();
};

window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "KeyZ") shoot(); });
window.addEventListener("keyup", e => keys[e.code] = false);

const setBtn = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[k] = true; if(k === "KeyZ") shoot(); });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[k] = false; });
};
setBtn("btnLeft", "ArrowLeft"); setBtn("btnRight", "ArrowRight"); setBtn("btnJump", "ArrowUp"); setBtn("btnShoot", "KeyZ");
</script>
</body>
</html>
