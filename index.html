<!DOCTYPE html>
<html>
<head>
    <title>Super Farioli</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json?v=20">
    <meta name="theme-color" content="#ff00ff">
    <!-- Apple PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Super Farioli">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #050505 0%, #2b0b3d 40%, #76218e 70%, #ff00ff 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            touch-action: manipulation; 
        }
        canvas { 
            border: 6px solid #0ff; 
            image-rendering: pixelated; 
            max-width: 90vw; 
            max-height: 85vh; 
            background: #5c94fc; 
            display: none; 
            box-shadow: 0 0 20px #0ff, 0 0 10px #f0f;
            z-index: 5;
        }
        
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 100;
        }

        #namePopup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.9); border: 4px solid #f0f; padding: 40px; 
            text-align: center; box-shadow: 10px 10px 0 #0ff; z-index: 1000; width: 300px; 
            display: block; 
        }
        #nameInput { 
            padding: 12px; width: 85%; background: #111; border: 2px solid #0ff; 
            color: #fff; font-family: inherit; font-size: 20px; text-align: center; 
            text-transform: uppercase; margin: 20px 0; outline: none; 
            box-shadow: 0 0 10px #0ff;
        }
        #startBtn { 
            padding: 14px 30px; background: #f0f; color: #fff; border: 2px solid #fff; 
            font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            box-shadow: 4px 4px 0 #0ff; transition: 0.2s;
        }
        #startBtn:hover { transform: scale(1.05); box-shadow: 6px 6px 0 #0ff; }
        
        .controls { display: none; justify-content: space-between; width: 95vw; padding: 15px; margin-top: 10px; z-index: 20; }
        .btn { width: 70px; height: 70px; background: rgba(51, 51, 51, 0.8); border: 3px solid #0ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; box-shadow: 0 4px #f0f; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #f0f; background: #555; }
        .d-pad, .actions { display: flex; gap: 15px; }
    </style>
</head>
<body>
    <div id="scanlines"></div>
    <button id="menuBtn" style="position: fixed; top: 15px; right: 15px; padding: 12px 18px; background: #000; color: #f0f; border: 3px solid #0ff; cursor: pointer; display: none; z-index: 5000; font-family: inherit; font-size: 14px; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 15px #0ff;">MENU</button>
    <div id="namePopup">
        <h2 id="entryTitle" style="color: #ff0; margin: 0; text-shadow: 2px 2px #f00; cursor: pointer; user-select: none;">PLAYER ENTRY</h2>
        <input type="text" id="nameInput" maxlength="10" placeholder="NOME">
        <br>
        <div id="levelSelectArea" style="margin: 15px 0; border: 1px solid #0ff; padding: 10px;">
            <p style="color: #fff; font-size: 14px; margin: 0 0 10px 0; letter-spacing: 1px;">LEVEL SELECT:</p>
            <div id="levelButtons" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-height: 80px; overflow-y: auto;"></div>
        </div>
        <button id="startBtn" style="background:#0f0; color:#000; padding:15px 30px; font-weight:bold; border:none; cursor:pointer;">START GAME (v30)</button>
        <br><br>
        <button id="installBtn" style="display:none; padding:10px 20px; background:#0ff; color:#000; border:2px solid #fff; font-family:inherit; font-weight:bold; cursor:pointer; text-transform:uppercase; box-shadow:4px 4px 0 #000;">DOWNLOAD APP</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 350; canvas.height = 600;

const TILE_SIZE = 25; 

// 1. GERAÇÃO DE NÍVEIS (VITAL: MOVIDO PARA O TOPO)
const allLevels = [];
for (let n = 0; n < 100; n++) {
    let newLevel = [1,1,1,1,1];
    for (let i = 0; i < 150 + (n * 3); i++) {
        let rand = Math.random();
        if (rand < 0.65) newLevel.push(1);
        else if (rand < 0.75) newLevel.push(0);
        else if (rand < 0.85) newLevel.push(3);
        else if (rand < 0.90) newLevel.push(4);
        else newLevel.push(1);
    }
    newLevel.push(2,1,1,1,1);
    allLevels.push(newLevel);
}

// 2. SINCRONIZAÇÃO DE PROGRESSO
let maxLevel = parseInt(localStorage.getItem("marioMaxLevel")) || 0;
let savedCurrent = parseInt(localStorage.getItem("marioLevel")) || 0;
maxLevel = Math.max(maxLevel, savedCurrent);
localStorage.setItem("marioMaxLevel", maxLevel);

let currentLevel = maxLevel; 
let score = parseInt(localStorage.getItem("marioScore")) || 0;
let cameraX = 0, playerName = "NOME", pauseTimeout;
let fireballs = [], lastFireTime = 0, gameTime = 400, lastTimeUpdate = Date.now();
let isPaused = true, checkpointReached = (localStorage.getItem("marioCheckpointReached") === "true"), checkpointMsgTimer = 0;

window.onerror = function(msg, url, line) {
    console.error("DEBUG:", msg, "LINE:", line);
    alert("ERRO DETETADO: " + msg + "\nLINHA: " + line);
};

function updateLevelButtons() {
    const area = document.getElementById("levelButtons"); 
    if (!area) return;
    area.innerHTML = "";
    const totalLevels = Math.min(allLevels.length - 1, maxLevel);
    for (let i = 0; i <= totalLevels; i++) {
        const btn = document.createElement("button");
        btn.innerText = `1-${i + 1}`;
        btn.style.cssText = "padding: 8px 10px; background: #111; color: #0ff; border: 2px solid #0ff; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 12px; min-width: 50px; transition: 0.2s;";
        if (i === currentLevel) { 
            btn.style.borderColor = "#f0f"; btn.style.color = "#f0f"; btn.style.boxShadow = "0 0 15px #f0f"; btn.style.background = "#222";
        }
        btn.onclick = (e) => { 
            e.preventDefault();
            currentLevel = i; 
            // Reset de pontos se escolher um nível inferior ao máximo
            if (currentLevel < maxLevel) {
                score = 0;
                localStorage.setItem("marioScore", 0);
            }
            localStorage.setItem("marioLevel", currentLevel); 
            updateLevelButtons(); 
        };
        area.appendChild(btn);
    }
}
// Garantir que os botões aparecem assim que o script carrega
setTimeout(updateLevelButtons, 100);

// MASTER CHEAT (5 Cliques no Título para DESBLOQUEAR TUDO - 100 Níveis)
let unlockClicks = 0;
document.getElementById("entryTitle").onclick = () => {
    unlockClicks++;
    if (unlockClicks >= 5) {
        maxLevel = 99; // Desbloqueia até ao 100 (índice 99)
        localStorage.setItem("marioMaxLevel", maxLevel);
        document.getElementById("entryTitle").style.color = "#0ff";
        document.getElementById("entryTitle").innerText = "ALL LEVELS UNLOCKED!";
        updateLevelButtons();
    }
};

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'inline-block';
});
document.getElementById('installBtn').onclick = async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
        deferredPrompt = null;
    }
};

// IMAGENS
const imgHero = new Image(); imgHero.src = 'heroi.png';
const imgMonstro = new Image(); imgMonstro.src = 'monstro1.png';
const imgPlatSuspensas = new Image(); imgPlatSuspensas.src = 'plataforma.jpg';
const imgChaoNormal = new Image(); imgChaoNormal.src = 'chao_normal.jpg';
const imgChaoNeve = new Image(); imgChaoNeve.src = 'chao_neve.jpg';


let monsters = [];
function initMonsters() {
    monsters = [];
    if (!allLevels[currentLevel]) return; // Proteção contra nível inexistente
    const level = allLevels[currentLevel];
    for(let i=15; i<level.length - 10; i++) {
        if(level[i] === 1 && Math.random() > 0.90) {
            monsters.push({ x: i * TILE_SIZE, y: canvas.height - TILE_SIZE - 30, width: 30, height: 30, alive: true, dir: -1.8 });
        }
    }
}

const player = { 
    x: 40, y: 100, width: 32, height: 44, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100, 
    isInvincible: false, timerInv: 0, 
    checkpointX: parseFloat(localStorage.getItem("marioCheckpointX")) || 40 
};
const keys = {};

function resetPlayer(reason) {
    if (reason === "win") {
        player.hp = Math.min(100, player.hp + 25);
        player.checkpointX = 40;
        checkpointReached = false;
        if (currentLevel > maxLevel) { maxLevel = currentLevel; localStorage.setItem("marioMaxLevel", maxLevel); }
        localStorage.setItem("marioLevel", currentLevel);
        localStorage.setItem("marioScore", score);
        localStorage.setItem("marioCheckpointX", 40);
        localStorage.setItem("marioCheckpointReached", "false");
        updateLevelButtons();
    } else if (reason === "fall" || reason === "death") {
        player.hp = 100;
        if (reason === "death") { 
            // Já não fazemos currentLevel = 0 para ser um checkpoint permanente de nível
        }
    }
    
    player.x = (reason === "start") ? 80 : (player.checkpointX || 40); 
    player.y = 100; player.velX = 0; player.velY = 0;
    player.jumping = false; player.isInvincible = false;
    cameraX = Math.max(0, player.x - 150); fireballs = []; gameTime = 400; 
    initMonsters();

    isPaused = true;
    if (pauseTimeout) clearTimeout(pauseTimeout);
    pauseTimeout = setTimeout(() => { isPaused = false; }, 1000);
}

function shoot() {
    if (Date.now() - lastFireTime > 300 && !isPaused) {
        fireballs.push({ x: player.x + (player.direction === 1 ? player.width : -12), y: player.y + 18, width: 12, height: 12, velX: 8 * player.direction });
        lastFireTime = Date.now();
    }
}

// EVENTOS
document.getElementById("nameInput").value = localStorage.getItem("marioPlayerName") || "";
document.getElementById("startBtn").onclick = function() {
    playerName = document.getElementById("nameInput").value.toUpperCase() || "NOME";
    localStorage.setItem("marioPlayerName", playerName);
    // VERIFICAÇÃO DE SEGURANÇA DE NÍVEL
    if (currentLevel < 0 || currentLevel >= allLevels.length) {
        currentLevel = 0;
        localStorage.setItem("marioLevel", 0);
    }
    
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    document.getElementById("menuBtn").style.display = "block";
    resetPlayer("start");
    if (!window.gameStarted) { 
        window.gameStarted = true;
        gameLoop(); 
    }
};

document.getElementById("menuBtn").onclick = () => {
    isPaused = true;
    if (pauseTimeout) clearTimeout(pauseTimeout);
    canvas.style.display = "none";
    document.getElementById("gameControls").style.display = "none";
    document.getElementById("menuBtn").style.display = "none";
    document.getElementById("namePopup").style.display = "block";
    updateLevelButtons();
};

window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "KeyZ" || e.code === "KeyB") shoot(); });
window.addEventListener("keyup", e => keys[e.code] = false);

function setBtn(id, k) {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[k] = true; if(k === "KeyZ") shoot(); });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[k] = false; });
}
setBtn("btnLeft", "ArrowLeft"); setBtn("btnRight", "ArrowRight"); setBtn("btnJump", "ArrowUp"); setBtn("btnShoot", "KeyZ");

function update() {
    if (isPaused) return;
    if (Date.now() - lastTimeUpdate > 1000) { gameTime--; lastTimeUpdate = Date.now(); if(gameTime <= 0) resetPlayer("death"); }
    
    // MUDANÇA: Paragem instantânea
    if (keys["ArrowRight"]) { player.velX = 4.5; player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX = -4.5; player.direction = -1; }
    else { player.velX = 0; }
    
    if (keys["ArrowUp"] && !player.jumping) { player.jumping = true; player.velY = -11; }
    player.velY += 0.5;
    
    let level = allLevels[currentLevel];
    
    // MUDANÇA: Colisão lateral para obrigar a saltar
    let oldX = player.x;
    player.x += player.velX;
    let tS = level[Math.floor((player.velX > 0 ? player.x + player.width : player.x) / TILE_SIZE)];
    let hW = (tS === 1 ? 1 : tS === 3 ? 2 : tS === 4 ? 3 : 0);
    if (hW > 0 && player.y + player.height > canvas.height - hW * TILE_SIZE + 5) {
        player.x = oldX; player.velX = 0;
    }

    player.y += player.velY;

    let tileX = Math.floor((player.x + player.width/2) / TILE_SIZE);
    let groundY = 1000;
    if (level[tileX] === 1) groundY = canvas.height - TILE_SIZE;
    else if (level[tileX] === 3) groundY = canvas.height - TILE_SIZE * 2;
    else if (level[tileX] === 4) groundY = canvas.height - TILE_SIZE * 3;
    else if (level[tileX] === 6) groundY = canvas.height - TILE_SIZE * 4;

    if (player.y + player.height > groundY && player.velY >= 0) { player.y = groundY - player.height; player.velY = 0; player.jumping = false; }
    if (player.y > canvas.height) { resetPlayer("fall"); return; }
    
    cameraX = Math.max(0, player.x - 150);

    // BALAS
    for (let i = fireballs.length - 1; i >= 0; i--) {
        let f = fireballs[i]; f.x += f.velX;
        if (f.x < cameraX - 100 || f.x > cameraX + canvas.width + 100) { fireballs.splice(i, 1); continue; }
        let fTileX = Math.floor((f.x + (f.velX > 0 ? f.width : 0)) / TILE_SIZE);
        let fTileY = level[fTileX];
        let objH = (fTileY === 3 ? 2 : fTileY === 4 ? 3 : fTileY === 1 ? 1 : 0);
        if (objH > 0 && f.y + f.height > canvas.height - (objH * TILE_SIZE)) { fireballs.splice(i, 1); continue; }
        monsters.forEach(m => {
            if (m.alive && f.x < m.x + m.width && f.x + f.width > m.x && f.y < m.y + m.height && f.y + f.height > m.y) {
                m.alive = false; score += 200; fireballs.splice(i, 1);
            }
        });
    }

    // MONSTROS
    monsters.forEach(m => {
        if (m.alive) {
            m.x += m.dir;
            let mTile = Math.floor((m.x + (m.dir > 0 ? m.width : 0)) / TILE_SIZE);
            if(level[mTile] === 0 || level[mTile] >= 3) m.dir *= -1;
            if (player.x < m.x + m.width && player.x + player.width > m.x && player.y < m.y + m.height && player.y + player.height > m.y) {
                if (player.velY > 0 && player.y + player.height < m.y + m.height / 2) { m.alive = false; score += 100; player.velY = -7; }
                else if (!player.isInvincible) { player.hp -= 25; player.isInvincible = true; player.timerInv = 60; if (player.hp <= 0) resetPlayer("death"); }
            }
        }
    });

    if (player.isInvincible) { player.timerInv--; if (player.timerInv <= 0) player.isInvincible = false; }
    
    // CHECKPOINT DE MEIO DE NÍVEL
    let lvlW = level.length * TILE_SIZE;
    if (!checkpointReached && player.x > lvlW / 2) {
        checkpointReached = true;
        player.checkpointX = lvlW / 2;
        checkpointMsgTimer = 60;
        localStorage.setItem("marioScore", score);
        localStorage.setItem("marioCheckpointX", player.checkpointX);
        localStorage.setItem("marioCheckpointReached", "true");
    }

    if (level[tileX] === 2) { score += 1000; currentLevel++; resetPlayer("win"); }
}

function draw() {
    const level = allLevels[currentLevel];
    if (isPaused || !level) {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "30px Courier"; ctx.textAlign = "center";
        ctx.fillText(`WORLD 1-${currentLevel+1}`, canvas.width/2, canvas.height/2);
        if (currentLevel > 0 || (player && player.checkpointX > 40)) {
            ctx.fillStyle = "#0ff"; ctx.font = "bold 14px Courier";
            ctx.fillText("PROGRESSO CARREGADO", canvas.width/2, canvas.height/2 + 40);
        }
        ctx.textAlign = "left"; return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);

    // DEFINIÇÃO DE BIOMA (Ciclos de 20 níveis)
    let biome = "grass";
    if (currentLevel >= 20 && currentLevel < 40) biome = "snow";
    else if (currentLevel >= 40 && currentLevel < 60) biome = "night";
    else if (currentLevel >= 60 && currentLevel < 80) biome = "dirt";
    else if (currentLevel >= 80) biome = "cyber";

    // FUNDO
    for(let m=0; m < level.length; m += 20) {
        let drawX = m * TILE_SIZE;
        if (biome === "snow") ctx.fillStyle = "#a8d5e2";
        else if (biome === "night") ctx.fillStyle = "#1a0f2e";
        else if (biome === "dirt") ctx.fillStyle = "#5d4037";
        else if (biome === "cyber") ctx.fillStyle = "#4a148c";
        else ctx.fillStyle = "#4caf50"; 

        ctx.beginPath();
        ctx.moveTo(drawX - 60, canvas.height - TILE_SIZE); 
        ctx.lineTo(drawX + 40, canvas.height - 130); 
        ctx.lineTo(drawX + 140, canvas.height - TILE_SIZE); 
        ctx.fill();
        
        ctx.fillStyle = "rgba(255,255,255,0.6)"; 
        if (biome === "night" || biome === "cyber") ctx.fillStyle = "rgba(255, 255, 0, 0.4)";
        ctx.beginPath(); ctx.arc(drawX + 80, 50, 15, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(drawX + 100, 50, 20, 0, Math.PI*2); ctx.fill();
    }

    // CENÁRIO
    level.forEach((tile, i) => {
        if (tile === 0) return;
        let x = i * TILE_SIZE;
        let h = (tile === 3 ? 2 : tile === 4 ? 3 : 1);
        let y = (tile === 6) ? canvas.height - (4 * TILE_SIZE) : canvas.height - (h * TILE_SIZE);
        if (tile === 1 || tile === 3 || tile === 4) {
            if (biome === "snow") {
                if (imgChaoNeve.complete) ctx.drawImage(imgChaoNeve, x, y, TILE_SIZE, h * TILE_SIZE);
                else { ctx.fillStyle = "#ffffff"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE); }
            } else if (biome === "dirt") {
                if (imgChaoNormal.complete) ctx.drawImage(imgChaoNormal, x, y, TILE_SIZE, h * TILE_SIZE);
                else { ctx.fillStyle = "#5d4037"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE); }
            } else if (biome === "night") {
                ctx.fillStyle = "#2c1a4d"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE);
                ctx.fillStyle = "#6a1b9a"; ctx.fillRect(x, y, TILE_SIZE, 5);
            } else if (biome === "cyber") {
                ctx.fillStyle = "#121212"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE);
                ctx.fillStyle = "#0ff"; ctx.fillRect(x, y, TILE_SIZE, 3);
                ctx.fillStyle = "#f0f"; ctx.fillRect(x, y + 3, TILE_SIZE, 2);
            } else {
                ctx.fillStyle = "#8b4513"; ctx.fillRect(x, y, TILE_SIZE, h * TILE_SIZE);
                ctx.fillStyle = "#ff0000"; ctx.fillRect(x, y, TILE_SIZE, 5); // TOPO VERMELHO PARA TESTE
            }
        } else if (tile === 6) {
            if (imgPlatSuspensas.complete) ctx.drawImage(imgPlatSuspensas, x, y, TILE_SIZE, TILE_SIZE);
            else { ctx.fillStyle = "#ff0"; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); }
        } else if (tile === 2) {
            ctx.fillStyle = "#fff"; ctx.fillRect(x+10, canvas.height-150, 5, 150);
            ctx.fillStyle = "#f0f"; ctx.fillRect(x+15, canvas.height-150, 20, 15);
        }
    });

    monsters.forEach(m => { if(m.alive) ctx.drawImage(imgMonstro, m.x, m.y, m.width, m.height); });
    fireballs.forEach(f => { ctx.fillStyle = "#ffeb3b"; ctx.beginPath(); ctx.arc(f.x+6, f.y+6, 6, 0, Math.PI*2); ctx.fill(); });
    
    if (!player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0) {
        ctx.save();
        if (player.direction === -1) {
            ctx.translate(player.x + player.width, player.y);
            ctx.scale(-1, 1);
            ctx.drawImage(imgHero, 0, 0, player.width, player.height);
        } else {
            ctx.drawImage(imgHero, player.x, player.y, player.width, player.height);
        }
        ctx.restore();
    }
    
    if (checkpointMsgTimer > 0) {
        ctx.fillStyle = "#0ff"; ctx.font = "bold 20px Courier"; ctx.textAlign = "center";
        ctx.fillText("CHECKPOINT!", player.x + player.width/2, player.y - 20);
        ctx.textAlign = "left"; checkpointMsgTimer--;
    }
    
    ctx.restore();
    
    // UI Ajustada para Vertical
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px Courier";
    ctx.fillText(`${playerName}: ${score}`, 15, 30);
    ctx.fillText(`WORLD 1-${currentLevel+1}`, 15, 55);
    ctx.fillText(`TIME: ${gameTime}`, 250, 30);
    let hearts = ""; for(let h=0; h<player.hp/25; h++) hearts += "❤";
    ctx.fillStyle="#f00"; ctx.font = "bold 20px Courier"; ctx.fillText(hearts, 250, 60);

    // DEBUG VISUAL DE ESTADO (Bolinha e Dados)
    ctx.fillStyle = isPaused ? "red" : "green";
    ctx.beginPath(); ctx.arc(10, 10, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "10px Arial";
    ctx.fillText(`LVL:${currentLevel+1} P:${Math.round(player.x)} C:${Math.round(cameraX)}`, 20, 15);
}

function gameLoop() { 
    requestAnimationFrame(gameLoop);
    try {
        update(); 
        draw(); 
    } catch(e) {
        // Silenciar erros para manter o loop vivo, mas logar no console
    }
}

// REGISTO PWA
    if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Forçar limpeza se versão for antiga
    if (localStorage.getItem('farioli_v') !== '30') {
      navigator.serviceWorker.getRegistrations().then(regs => {
        for(let reg of regs) reg.unregister();
        localStorage.setItem('farioli_v', '30');
        window.location.reload(true);
      });
    }

    navigator.serviceWorker.register('./sw-v30.js?v=30').then(reg => {
       console.log('Farioli v30 OK');
    });
  });
}
</script>
