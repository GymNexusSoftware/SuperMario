<!DOCTYPE html>
<html>
<head>
    <title>Super Mario - Retro Name Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; color: white; }
        canvas { border: 4px solid #333; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; background: #5c94fc; display: none; /* Escondido até o nome ser introduzido */ }
        .controls { display: none; /* Escondido até o nome ser introduzido */ justify-content: space-between; width: 95vw; padding: 15px; margin-top: 10px; }
        .btn { width: 65px; height: 65px; background: #333; border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #555; }
        .d-pad, .actions { display: flex; gap: 15px; }

        /* --- ESTILO RETRO ANOS 80 DO POP-UP --- */
        #namePopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 4px solid #fff; padding: 30px; text-align: center;
            box-shadow: 10px 10px 0 #f0f, -10px -10px 0 #0ff; /* Neon Shadow */
            z-index: 100; width: 280px; image-rendering: pixelated;
        }
        #namePopup h2 { font-size: 24px; color: #ff0; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0 #f00; }
        #namePopup p { font-size: 14px; color: #fff; margin: 15px 0; }
        #nameInput {
            padding: 12px; width: 80%; background: #111; border: 3px solid #0ff;
            color: #fff; font-family: inherit; font-size: 18px; text-align: center;
            text-transform: uppercase; outline: none; box-shadow: inset 0 0 10px #0ff;
        }
        #nameInput:focus { border-color: #f0f; box-shadow: inset 0 0 10px #f0f; color: #ff0; }
        #startBtn {
            margin-top: 25px; padding: 12px 25px; background: #f0f; color: #fff;
            border: 3px solid #fff; font-family: inherit; font-size: 18px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 5px 5px 0 #0ff; transition: all 0.1s;
        }
        #startBtn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #0ff; }
    </style>
</head>
<body>

    <div id="namePopup">
        <h2>PLAYER ENTRY</h2>
        <p>INTRODUZ O TEU NOME</p>
        <input type="text" id="nameInput" maxlength="10" placeholder="MARIO" autocomplete="off">
        <br>
        <button id="startBtn">INICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="controls" id="gameControls">
        <div class="d-pad"><div class="btn" id="btnLeft">←</div><div class="btn" id="btnRight">→</div></div>
        <div class="actions"><div class="btn" id="btnShoot" style="background: #a00;">B</div><div class="btn" id="btnJump" style="background: #a00;">A</div></div>
    </div>

<script>
// Variável global para o nome, será definida pelo Pop-up
let playerName = "MARIO";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 600; canvas.height = 350;

const TILE_SIZE = 25; 
let currentLevel = 0;
let score = 0;
let gameTime = 400;
let lastTimeUpdate = Date.now();
let cameraX = 0;

// GERADOR DE 100 NÍVEIS COM PLATAFORMAS (Mantido exatamente igual)
const allLevels = [];
for (let n = 0; n < 100; n++) {
    let newLevel = [1,1,1,1,1];
    let length = 150 + (n * 3);
    for (let i = 0; i < length; i++) {
        let rand = Math.random();
        if (rand < 0.60) newLevel.push(1);
        else if (rand < 0.75) newLevel.push(0);
        else if (rand < 0.85) newLevel.push(3);
        else if (rand < 0.92) newLevel.push(4);
        else newLevel.push(5);
    }
    newLevel.push(1,1,1,2);
    allLevels.push(newLevel);
}

let goombas = [];
function initGoombas() {
    goombas = [];
    const level = allLevels[currentLevel];
    for(let i=10; i<level.length - 5; i++) {
        if(level[i] >= 1 && Math.random() > 0.90) {
            let h = level[i] === 1 ? 1 : (level[i]-1);
            goombas.push({ x: i * TILE_SIZE, y: canvas.height - (h * TILE_SIZE) - 18, width: 18, height: 18, alive: true, dir: -1 });
        }
    }
}

const player = { x: 40, y: 100, width: 20, height: 26, velX: 0, velY: 0, jumping: false, direction: 1, hp: 100, isInvincible: false, invincibilityTimer: 0 };
const keys = {};

// Função de Reset (Cura a cada 3 níveis mantida)
function resetPlayer(keepHP = false) {
    if (keepHP && currentLevel > 0 && currentLevel % 3 === 0) {
        player.hp = Math.min(100, player.hp + 25);
    } else if (!keepHP) {
        player.hp = 100;
    }
    player.x = 40; player.y = 100; player.velX = 0; player.velY = 0;
    player.jumping = false; player.isInvincible = false; player.invincibilityTimer = 0;
    gameTime = 400; cameraX = 0; initGoombas();
}

// --- LÓGICA DE INICIALIZAÇÃO DO POP-UP ---
document.getElementById("startBtn").addEventListener("click", () => {
    const inputVal = document.getElementById("nameInput").value.trim().toUpperCase();
    playerName = inputVal || "MARIO"; // Define o nome ou usa o padrão
    
    // Esconde o pop-up e mostra o jogo
    document.getElementById("namePopup").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    
    // Inicia o jogo
    resetPlayer();
    gameLoop();
});

// Suporte para a tecla Enter no input
document.getElementById("nameInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") document.getElementById("startBtn").click();
});

// Controlos de Teclado (Mantidos)
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
};
setupBtn("btnLeft", "ArrowLeft"); setupBtn("btnRight", "ArrowRight"); setupBtn("btnJump", "ArrowUp");

function update() {
    if (Date.now() - lastTimeUpdate > 1000) { gameTime--; lastTimeUpdate = Date.now(); if(gameTime <= 0) resetPlayer(); }
    
    if (keys["ArrowRight"]) { player.velX += 0.5; player.direction = 1; }
    else if (keys["ArrowLeft"]) { player.velX -= 0.5; player.direction = -1; }
    else { player.velX *= 0.8; }
    
    player.velX = Math.max(-4.5, Math.min(4.5, player.velX));
    if (keys["ArrowUp"] && !player.jumping) { player.jumping = true; player.velY = -11; }
    player.velY += 0.5;
    
    player.x += player.velX;
    player.y += player.velY;

    let level = allLevels[currentLevel];
    let tileIndex = Math.floor((player.x + player.width/2) / TILE_SIZE);
    let tileType = level[tileIndex];
    
    let groundY = 1000; 
    if (tileType === 1) groundY = canvas.height - TILE_SIZE;
    else if (tileType === 3) groundY = canvas.height - TILE_SIZE * 2;
    else if (tileType === 4) groundY = canvas.height - TILE_SIZE * 3;
    else if (tileType === 5) groundY = canvas.height - TILE_SIZE * 4;

    if (player.y + player.height > groundY && player.velY >= 0) { 
        player.y = groundY - player.height; 
        player.velY = 0; 
        player.jumping = false; 
    }
    
    if (player.y > canvas.height) resetPlayer();
    cameraX = Math.max(0, player.x - 150);

    goombas.forEach(g => {
        if (g.alive) {
            g.x += g.dir;
            if (player.x < g.x + g.width && player.x + player.width > g.x && player.y < g.y + g.height && player.y + player.height > g.y) {
                if (player.velY > 0) { g.alive = false; score += 100; player.velY = -7; } 
                else if (!player.isInvincible) { player.hp -= 25; player.isInvincible = true; player.invincibilityTimer = 70; if (player.hp <= 0) resetPlayer(); }
            }
        }
    });

    if (player.isInvincible) { player.invincibilityTimer--; if (player.invincibilityTimer <= 0) player.isInvincible = false; }
    if (tileType === 2) { score += 1000; currentLevel++; resetPlayer(true); }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); 
    ctx.translate(-cameraX, 0);

    const level = allLevels[currentLevel];
    
    // Desenhar Montes no Fundo (Mantido)
    for(let m=0; m<level.length; m+=20) {
        ctx.fillStyle = "#4caf50";
        ctx.beginPath();
        ctx.moveTo(m*TILE_SIZE - 50, canvas.height - TILE_SIZE);
        ctx.lineTo(m*TILE_SIZE + 50, canvas.height - 120);
        ctx.lineTo(m*TILE_SIZE + 150, canvas.height - TILE_SIZE);
        ctx.fill();
    }

    // Desenhar Relevo e Plataformas (Mantido)
    level.forEach((tile, i) => {
        let x = i * TILE_SIZE;
        if (x + TILE_SIZE < cameraX || x > cameraX + canvas.width) return;

        if (tile === 1) { ctx.fillStyle = "#8b4513"; ctx.fillRect(x, canvas.height - TILE_SIZE, TILE_SIZE, TILE_SIZE); ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, canvas.height - TILE_SIZE, TILE_SIZE, 5);
        } else if (tile >= 3) { let h = (tile === 3 ? 2 : (tile === 4 ? 3 : 4)); ctx.fillStyle = "#8b4513"; ctx.fillRect(x, canvas.height - (h * TILE_SIZE), TILE_SIZE, h * TILE_SIZE); ctx.fillStyle = "#4caf50"; ctx.fillRect(x, canvas.height - (h * TILE_SIZE), TILE_SIZE, 6);
        } else if (tile === 2) { ctx.fillStyle = "#fff"; ctx.fillRect(x + 10, canvas.height - 150, 5, 150); ctx.fillStyle = "#f0f"; ctx.fillRect(x + 15, canvas.height - 150, 20, 15); }
    });

    goombas.forEach(g => { if(g.alive) { ctx.fillStyle = "#5d4037"; ctx.fillRect(g.x, g.y, g.width, g.height); }});
    
    if (!player.isInvincible || Math.floor(Date.now() / 100) % 2 === 0) { 
        ctx.fillStyle = "#f00"; ctx.fillRect(player.x, player.y, player.width, player.height); 
    }
    ctx.restore();

    // HUD com Nome Escolhido (Mantido)
    ctx.fillStyle = "#fff"; ctx.font = "bold 16px Courier";
    ctx.fillText(`${playerName} ${score}`, 20, 30);
    ctx.fillText(`WORLD 1-${currentLevel+1}`, 250, 30);
    let hearts = ""; for(let h=0; h<player.hp/25; h++) hearts += "❤";
    ctx.fillStyle="#f00"; ctx.fillText(hearts, 20, 55);
}

// Loop removido do resetPlayer inicial para esperar pelo Pop-up
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

</script>
</body>
</html>
